<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { background: #004687; color: white; padding: 20px; border-radius: 10px 10px 0 0; text-align: center; }
        .content { padding: 20px; }
        .footer { font-size: 12px; color: #777; text-align: center; margin-top: 20px; }
        .highlight { font-weight: bold; color: #004687; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nueva Incidencia</h1>
        </div>
        <div class="content">
            <p>Hola <span class="highlight">{admin_name}</span>,</p>
            <p>Se ha reportado una nueva incidencia en la plataforma:</p>
            <p><strong>Usuario:</strong> {user_name}</p>
            <p><strong>Fecha:</strong> {created_at}</p>
            <div style="background: #f9f9f9; padding: 15px; border-left: 4px solid #004687; margin: 20px 0;">
                <p><strong>Descripción:</strong></p>
                <p>{description}</p>
            </div>
            <p>Por favor, accede al panel de administración para revisarla.</p>
        </div>
        <div class="footer">
            <p>Equipo RESERVIVES - IES Luis Vives</p>
        </div>
    </div>
</body>
</html>
