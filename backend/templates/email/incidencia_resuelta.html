<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { background: #28a745; color: white; padding: 20px; border-radius: 10px 10px 0 0; text-align: center; }
        .content { padding: 20px; }
        .footer { font-size: 12px; color: #777; text-align: center; margin-top: 20px; }
        .highlight { font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Incidencia Resuelta</h1>
        </div>
        <div class="content">
            <p>Hola <span class="highlight">{user_name}</span>,</p>
            <p>Tu incidencia ha sido resuelta por el equipo de administración:</p>
            <div style="background: #f1f1f1; padding: 15px; margin: 15px 0; border-radius: 5px;">
                <p><strong>Tu reporte:</strong> {description}</p>
            </div>
            <div style="background: #e9f7ef; padding: 15px; border-left: 4px solid #28a745; margin: 20px 0;">
                <p><strong>Comentario del Admin:</strong></p>
                <p>{resolution}</p>
            </div>
            <p>Gracias por ayudarnos a mejorar.</p>
        </div>
        <div class="footer">
            <p>Equipo RESERVIVES - IES Luis Vives</p>
        </div>
    </div>
</body>
</html>
