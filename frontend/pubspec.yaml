name: reservives
description: "App de Reservas de IES Luis Vives"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Estado y navegación
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0

  # i18n
  flutter_localizations:
    sdk: flutter

  # HTTP y API
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.1
  flutter_local_notifications: ^19.4.0

  # Autenticación OAuth2 multiplataforma (Microsoft EntraID)
  flutter_appauth: ^8.0.1

  # Almacenamiento local
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  confetti: ^0.8.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  http_parser: ^4.1.2

  # Utilidades
  url_launcher: ^6.2.2
  smooth_page_indicator: ^2.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/icons/luis_vives_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/luis_vives_icon.png"
  web:
    generate: true
    image_path: "assets/icons/luis_vives_icon.png"
  image_path: "assets/icons/luis_vives_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/luis_vives_icon.png"

  adaptive_icon_foreground_scale: 55

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/lang/
    - assets/images/
    - assets/icons/
